<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hjem</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/navbar.css">
    <script src="js/navbar.js" defer></script>
    <link rel="stylesheet" href="css/index.css">
    <script src="js/index.js"defer></script>
</head>
<body>
    <main>
        <section class="valg">
            <form id="sok">
                <label for="stasjon" id="stasjonlabel" hidden>Søk på værstasjon: </label>
                <input type="text" id="stasjon" placeholder="Søk på en værstasjon...">
                <button type="submit" id="sokknapp">&#x2315;</button>
            </form>
            <select id="dropdown" name="dropdown">
                <option>Velg en værstasjon...</option>
            </select>
        </section>
        <section class="statistikk">
            <h1 id="navn_stasjon">Målestasjon</h1>
            <div id="lokasjon">
                <h3 id="lengdegrad">Lengdegrader: </h3>
                <h3 id="breddegrad">Breddegrader: </h3>
            </div>
            <div id="stat_temp">Temperatur</div>
        </section>
        <section class="data">
            <div id="graph_area" class="data_div">
                <div id="graph_buttons">
                    <button id="graph_temp">Temp</button>
                    <button id="graph_airq">Luft</button>
                </div>
                <figure id="graph"></figure>
                <figcaption>En graf over temperatur i det siste døgnet for den valgte stasjonen</figcaption>
            </div>
        </section>
    </main>
    <footer>
        <p>Alle data er hentet fra Meteorologisk institutt</p>
    </footer>
    
</body>
</html>
